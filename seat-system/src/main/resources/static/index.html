<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>員工座位系統</title>

  <!-- Vue 3 CDN - no build tools needed -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <style>
    /* =============================================
       RESET & BASE
       ============================================= */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 24px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }

    /* =============================================
       EMPLOYEE DROPDOWN
       ============================================= */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .controls label { font-weight: bold; }

    .controls select {
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      min-width: 200px;
    }

    /* =============================================
       COLOUR LEGEND (空位 / 已佔用 / 請選擇)
       ============================================= */
    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .legend-box {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid #ccc;
    }

    /* Match colours to seat states below */
    .legend-box.available { background: #ffffff; }
    .legend-box.occupied  { background: #e74c3c; border-color: #e74c3c; }
    .legend-box.pending   { background: #14b8a6; border-color: #14b8a6; }

    /* =============================================
       FLOOR SECTION & SEAT GRID
       ============================================= */
    .floor-section { margin-bottom: 24px; }

    .floor-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #444;
    }

    /* 4-column grid – one column per seat */
    .seat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* Base seat tile */
    .seat {
      padding: 14px 10px;
      border-radius: 6px;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      user-select: none;
    }

    /* 空位 – white with grey border */
    .seat.available {
      background: #ffffff;
      border: 2px solid #cccccc;
      color: #333333;
    }
    .seat.available:hover {
      border-color: #14b8a6;
      background: #ecfeff;
    }

    /* 已佔用 – red, no hover pointer */
    .seat.occupied {
      background: #e74c3c;
      color: #ffffff;
      cursor: default;
    }

    /* 請選擇 – teal, set after user picks employee + clicks empty seat */
    .seat.pending {
      background: #14b8a6;
      border-color: #14b8a6;
      color: #ffffff;
    }
    .seat.pending:hover { opacity: 0.9; }

    /* Small hint shown inside occupied seats */
    .clear-hint {
      font-size: 11px;
      margin-top: 4px;
      color: #ffffff;
      opacity: 0.85;
    }

    /* =============================================
       SUBMIT BUTTON
       ============================================= */
    .btn-submit {
      padding: 10px 28px;
      background: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-submit:hover    { background: #1d4ed8; }
    .btn-submit:disabled { background: #aaaaaa; cursor: default; }

    /* =============================================
       SUCCESS / ERROR MESSAGES
       ============================================= */
    .msg {
      margin-top: 12px;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 4px;
    }
    .msg.success { background: #d1fae5; color: #065f46; }
    .msg.error   { background: #fee2e2; color: #991b1b; }
  </style>
</head>

<body>
<!-- ================================================
     VUE ROOT ELEMENT
     Everything inside #app is controlled by Vue.
     ================================================ -->
<div id="app">

  <h1>員工座位系統</h1>

  <!-- ── STEP 1: Pick an employee from the dropdown ── -->
  <div class="controls">
    <label for="empSelect">選擇員工：</label>
    <!--
      v-model binds the <select> value to the Vue reactive variable
      `selectedEmpId`. Changing the dropdown updates the variable instantly.
    -->
    <select id="empSelect" v-model="selectedEmpId">
      <option value="">-- 請選擇員工 --</option>
      <!--
        v-for loops over the `employees` array fetched from /api/employees.
        Each employee shows as "12006 - 王小明".
      -->
      <option v-for="e in employees" :key="e.empId" :value="e.empId">
        {{ e.empId }} - {{ e.name }}
      </option>
    </select>
  </div>

  <!-- ── COLOUR LEGEND ── -->
  <div class="legend">
    <div class="legend-item"><div class="legend-box available"></div> 空位</div>
    <div class="legend-item"><div class="legend-box occupied"></div> 已佔用</div>
    <div class="legend-item"><div class="legend-box pending"></div> 請選擇</div>
  </div>

  <!-- ── STEP 2: Click a seat ── -->
  <!--
    v-for loops over the `floors` array fetched from /api/seats/floors.
    Each floor has a `floorNo` and a `seats` array.
  -->
  <div v-for="floor in floors" :key="floor.floorNo" class="floor-section">
    <div class="floor-title">{{ floor.floorNo }} 樓</div>

    <div class="seat-grid">
      <!--
        Each seat tile:
          :class  – computed CSS class (available / occupied / pending)
          @click  – calls handleSeatClick(seat) on click
      -->
      <div
        v-for="seat in floor.seats"
        :key="seat.floorSeatSeq"
        :class="seatClass(seat)"
        @click="handleSeatClick(seat)"
      >
        <!-- Always show floor + seat label, e.g. "1樓: 座位3" -->
        <div>{{ floor.floorNo }}樓: {{ seat.seatNo }}</div>

        <!-- If occupied: show the employee ID currently sitting here -->
        <div v-if="seat.status === 'OCCUPIED'">[員編:{{ seat.empId }}]</div>

        <!-- If this is the pending (teal) seat: show the selected employee ID -->
        <div v-if="isPending(seat)">[員編:{{ selectedEmpId }}]</div>

        <!-- Hint for occupied seats so the user knows they can click to clear -->
        <div v-if="seat.status === 'OCCUPIED'" class="clear-hint">點擊清除</div>
      </div>
    </div>
  </div>

  <!-- ── STEP 3: Submit ── -->
  <!--
    Button is disabled when there is nothing to save
    (no pending seat assignment AND no seats marked for clearing).
    .size is used because clearSeats is a JavaScript Set.
  -->
  <div>
    <button
      class="btn-submit"
      @click="submit"
      :disabled="pendingSeat === null && clearSeats.size === 0"
    >
      送出
    </button>
  </div>

  <!-- Success / error feedback shown after submit -->
  <div v-if="message" :class="['msg', messageType]">{{ message }}</div>

</div><!-- end #app -->


<script>
// Destructure the Vue 3 Composition API helpers we need
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {

    // ── REACTIVE STATE ──────────────────────────────────────────────────────

    // Array of floor objects: [{ floorNo, seats: [{ floorSeatSeq, seatNo, empId, status }] }]
    const floors = ref([]);

    // Array of employee objects: [{ empId, name, email, floorSeatSeq }]
    const employees = ref([]);

    // The employee ID currently chosen in the dropdown (string, e.g. "12006")
    const selectedEmpId = ref('');

    // The ONE seat the user has clicked to assign (null = nothing selected)
    // Shape: { floorSeatSeq: number }
    const pendingSeat = ref(null);

    // Set of floorSeatSeq values the user wants to clear (red → empty)
    const clearSeats = ref(new Set());

    // Feedback message shown below the submit button
    const message = ref('');
    const messageType = ref('success'); // 'success' | 'error'


    // ── DATA LOADING ────────────────────────────────────────────────────────

    /** Fetch all floors + seats from the backend and update `floors`. */
    async function loadFloors() {
      const res  = await fetch('/api/seats/floors');
      const json = await res.json();
      floors.value = json.data; // json.data is the array of floor objects
    }

    /** Fetch all employees from the backend and update `employees`. */
    async function loadEmployees() {
      const res  = await fetch('/api/employees');
      const json = await res.json();
      employees.value = json.data;
    }

    // Load both when the component first mounts (page load)
    onMounted(() => {
      loadFloors();
      loadEmployees();
    });


    // ── HELPER FUNCTIONS ────────────────────────────────────────────────────

    /**
     * Returns true if `seat` is the one currently highlighted in teal
     * (the seat the user just clicked to assign).
     */
    function isPending(seat) {
      return pendingSeat.value !== null &&
             pendingSeat.value.floorSeatSeq === seat.floorSeatSeq;
    }

    /**
     * Returns the CSS class string for a seat tile.
     *   'seat pending'   – teal:  user just selected this empty seat
     *   'seat occupied'  – red:   already has an employee
     *   'seat available' – white: empty, ready to be assigned
     */
    function seatClass(seat) {
      if (isPending(seat))          return 'seat pending';
      if (seat.status === 'OCCUPIED') return 'seat occupied';
      return 'seat available';
    }


    // ── USER INTERACTION ────────────────────────────────────────────────────

    /**
     * Called when the user clicks any seat tile.
     *
     * Three cases:
     *   A) Occupied seat  → toggle "mark for clearing" (status = CLEAR_PENDING)
     *   B) Empty seat, no employee selected → show error
     *   C) Empty seat + employee selected   → set as the pending assignment
     */
    function handleSeatClick(seat) {
      message.value = ''; // clear any old feedback

      // ── Case A: occupied seat clicked ──
      if (seat.status === 'OCCUPIED') {
        if (clearSeats.value.has(seat.floorSeatSeq)) {
          // Second click: un-mark it
          clearSeats.value.delete(seat.floorSeatSeq);
          seat.status = 'OCCUPIED';
        } else {
          // First click: mark for clearing
          clearSeats.value.add(seat.floorSeatSeq);
          seat.status = 'CLEAR_PENDING'; // visual-only flag; seatClass falls through to 'occupied'
        }
        return;
      }

      // ── Case B: empty seat clicked but no employee chosen ──
      if (!selectedEmpId.value) {
        message.value     = '請先選擇員工';
        messageType.value = 'error';
        return;
      }

      // ── Case C: toggle the pending assignment ──
      if (pendingSeat.value && pendingSeat.value.floorSeatSeq === seat.floorSeatSeq) {
        // Clicking the already-pending seat deselects it
        pendingSeat.value = null;
      } else {
        pendingSeat.value = { floorSeatSeq: seat.floorSeatSeq };
      }
    }


    // ── SUBMIT ──────────────────────────────────────────────────────────────

    /**
     * Sends all pending changes to the backend:
     *   1. DELETE /api/seats/{seq}/employee  for every seat in clearSeats
     *   2. POST   /api/seats/assign          for the pending seat assignment
     * Then reloads the data so the UI reflects the new DB state.
     */
    async function submit() {
      message.value = '';
      try {

        // 1. Clear all seats the user marked for removal
        for (const seq of clearSeats.value) {
          const res  = await fetch(`/api/seats/${seq}/employee`, { method: 'DELETE' });
          const json = await res.json();
          if (!json.success) throw new Error(json.message); // surface business errors
        }

        // 2. Assign the pending seat (if any)
        if (pendingSeat.value && selectedEmpId.value) {
          const res  = await fetch('/api/seats/assign', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              empId:        selectedEmpId.value,
              floorSeatSeq: pendingSeat.value.floorSeatSeq
            })
          });
          const json = await res.json();
          if (!json.success) throw new Error(json.message);
        }

        // ── Success: reset UI state and reload fresh data ──
        message.value     = '座位更新成功！';
        messageType.value = 'success';
        pendingSeat.value  = null;
        clearSeats.value   = new Set();
        selectedEmpId.value = '';
        await loadFloors();
        await loadEmployees();

      } catch (e) {
        // Show the error message returned by the backend (or network error)
        message.value     = '錯誤：' + e.message;
        messageType.value = 'error';
      }
    }


    // ── EXPOSE TO TEMPLATE ──────────────────────────────────────────────────
    // Everything returned here is accessible in the HTML template above.
    return {
      floors, employees,
      selectedEmpId, pendingSeat, clearSeats,
      message, messageType,
      seatClass, isPending, handleSeatClick, submit
    };
  }
}).mount('#app'); // attach Vue to the <div id="app"> element
</script>
</body>
</html>
